<!DOCTYPE html>
<html>
<head>
    <title>Meeting Intelligence</title>
    <style>
        body {
            width: 400px;
            padding: 15px;
            font-family: Arial;
        }

        button {
            padding: 10px;
            margin-right: 10px;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }

        #transcript,
        #summary {
            margin-top: 15px;
            border: 1px solid #ccc;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <h2>Meeting Intelligence</h2>

    <button id="startBtn">
        Start Recording
    </button>

    <button id="stopBtn">
        Stop Recording
    </button>

    <div id="status">
        Idle
    </div>

    <h3>Transcript</h3>
    <div id="transcript"></div>

    <h3>MOM</h3>
    <div id="summary"></div>

    <script src="popup.js"></script>

</body>
</html>
